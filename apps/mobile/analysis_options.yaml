include: package:flutter_lints/flutter.yaml

# riverpod_lint 3.1.x ships as a native `analysis_server_plugin`, so it is
# configured here rather than via the legacy `custom_lint` analyzer plugin.
# `dart analyze` / `flutter analyze` picks this up automatically after
# `flutter pub get`.
plugins:
  riverpod_lint: ^3.1.0

analyzer:
  # `rust_builder/` is the vendored cargokit plugin shim (see ADR 0008 and
  # `apps/mobile/rust_builder/cargokit/MINOS-PATCHES.md`); its Dart sources
  # are upstream code we don't style-enforce. `build/` is ephemeral
  # generator output. Keep both out of `dart analyze` as defense in depth —
  # the sub-package pubspec already shields them in practice.
  exclude:
    - rust_builder/**
    - build/**
