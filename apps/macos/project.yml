name: Minos
options:
  bundleIdPrefix: ai.minos
  # Homebrew's latest XcodeGen emits a newer pbxproj format by default; pin the
  # project format so older CI Xcodes can still open the generated project.
  projectFormat: xcode15_3
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_IDENTITY: "-"
    SWIFT_STRICT_CONCURRENCY: complete
schemes:
  Minos:
    build:
      targets:
        Minos: all
    management:
      shared: true
  MinosTests:
    build:
      targets:
        Minos: all
        MinosTests: all
    test:
      config: Debug
      targets:
        - MinosTests
    management:
      shared: true
targets:
  Minos:
    type: application
    platform: macOS
    sources:
      - Minos
    resources:
      - Minos/Resources/Assets.xcassets
    info:
      path: Minos/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Minos
        CFBundleShortVersionString: "0.1.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.minos.macos
        HEADER_SEARCH_PATHS: $(SRCROOT)/Minos/Generated
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/../../target/xcframework/$(CONFIGURATION)
        OTHER_LDFLAGS: "-lminos_ffi_uniffi"
        OTHER_SWIFT_FLAGS: "-Xcc -fmodule-map-file=$(SRCROOT)/Minos/Generated/MinosCoreFFI.modulemap"
    preBuildScripts:
      - name: Build Rust UniFFI static library
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "$SRCROOT/../.."
          cargo xtask build-macos --configuration "$CONFIGURATION"
  MinosTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - MinosTests
    dependencies:
      - target: Minos
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        HEADER_SEARCH_PATHS: $(SRCROOT)/Minos/Generated
        OTHER_SWIFT_FLAGS: "-Xcc -fmodule-map-file=$(SRCROOT)/Minos/Generated/MinosCoreFFI.modulemap"
        PRODUCT_BUNDLE_IDENTIFIER: ai.minos.macos.tests
