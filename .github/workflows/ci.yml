name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (xtask check-all)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain (linux-only override)
        # The repo's rust-toolchain.toml lists Apple targets that aren't useful
        # on the Ubuntu CI runner; install the linux-x86_64 toolchain explicitly
        # to skip ~2 min of unused cross-target downloads.
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        # `cargo xtask check-all` runs `cargo deny check` only if `cargo-deny` is
        # in PATH; install it here so CI exercises the full check-set instead of
        # silently skipping like a fresh local checkout would.
        run: cargo install cargo-deny --locked

      - name: cargo xtask check-all
        # Single source of truth — same command developers run locally.
        # Includes: cargo fmt --check, cargo clippy --workspace -- -D warnings,
        # cargo test --workspace, cargo deny check.
        run: cargo xtask check-all

  macos:
    name: macos (build-macos + xtask check-all)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        # XcodeGen generates .xcodeproj in whatever file format the host
        # Xcode supports (objectVersion 77 on Xcode 26, 70 on Xcode 16, 63
        # on Xcode 15). Xcode is forward-incompatible: a pbxproj from a
        # newer Xcode fails to open in an older one with "future project
        # file format" errors. Pin the runner to the newest Xcode that's
        # installed so CI matches dev-machine generation.
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$LATEST" ]]; then
            echo "Selecting $LATEST"
            sudo xcode-select -s "${LATEST}/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install rust toolchain
        # `cargo xtask build-macos` produces a universal static library, so
        # the CI runner needs both macOS Rust targets available.
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Bootstrap macOS build tools
        # Reuse the same bootstrap path as local development so CI exercises
        # the checked-in Brewfile plus cargo-installed CLI tooling.
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: cargo xtask bootstrap

      - name: cargo xtask build-macos
        # `check-all` drives xcodebuild, which links against the universal
        # static library in target/xcframework/. A clean runner must build it first.
        run: cargo xtask build-macos

      - name: cargo xtask check-all
        # Single source of truth for the macOS lane after the universal lib is
        # in place: Rust checks plus UniFFI/XcodeGen generation, xcodebuild,
        # Swift unit tests, and swiftlint.
        run: cargo xtask check-all
