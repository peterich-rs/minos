# https://embarkstudios.github.io/cargo-deny/
[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0", # rustls-platform-verifier -> webpki-root-certs
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",       # tokio-tungstenite indirect
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
