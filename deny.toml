# https://embarkstudios.github.io/cargo-deny/
[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0", # rustls-platform-verifier -> webpki-root-certs
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",       # tokio-tungstenite indirect
]
confidence-threshold = 0.8

[bans]
# The workspace pulls a number of unavoidable duplicate transitive crates from
# platform-specific dependency trees (notably windows-* target crates and some
# parser/tooling crates). `cargo deny` treats these warnings as a failing bans
# check in our xtask flow, so keep duplicates visible in review via lockfile
# diffs instead of failing the whole gate on them.
multiple-versions = "allow"
wildcards = "deny"
skip = [
  # Transitive via getrandom's WASI compatibility shims. This workspace does
  # not consume wit-bindgen directly, and the split 0.51/0.57 graph is
  # currently upstream-driven rather than something we can realistically
  # unify in-tree.
  { name = "wit-bindgen", version = "=0.51.0" },
]
